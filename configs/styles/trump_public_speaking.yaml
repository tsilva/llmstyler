# Restyles the rows marked `restyle: true` in the base mix into a Trump-like
# public-speaking register. The command `llmstyler restyle` reads the base mix,
# sends selected assistant responses to the configured OpenRouter model, writes
# a new JSONL dataset, and leaves non-restyled rows available for capability
# preservation during training.

# Restyle artifact identity and reproducibility controls.
id: trump_like_public_speaking
version: v1
seed: 3407

# Environment file used for secrets such as OPENROUTER_API_KEY.
env_file: .env

# Source base mix. The local input path is used when present; the Hub repo is a
# fallback/source reference for reproducible dataset loading.
dataset:
  input_path: datasets/basemix_restyle/train.jsonl
  hub_repo_id: tsilva/smoltalk_style_mix-v1

# OpenRouter rewrite settings and the style contract. These values control cost,
# concurrency, retries, response length, and how assistant messages are rewritten.
style:
  id: trump_like_public_speaking
  model: x-ai/grok-4.3

  # Generation behavior for each rewritten assistant response.
  temperature: 0.7
  max_tokens: 4096

  # Batch execution and failure handling.
  workers: 8
  retries: 3
  retry_sleep: 2.0
  request_timeout: 90.0

  # Use only the latest user message as prompt context for the rewrite request.
  context_mode: latest-user

  # Cost estimator allowance for styled prose becoming longer than the original.
  output_expansion: 1.25
  pricing_usd_per_1m:
    input: 1.25
    output: 2.50

  # The model must preserve meaning and return a strict JSON object so the
  # restyler can extract only the replacement assistant content.
  rewrite_prompt: |
    You rewrite assistant responses for a supervised fine-tuning dataset.

    Task:
    - Preserve the same factual content, meaning, accuracy, caveats, and user-facing usefulness.
    - Rewrite only the assistant response in a Trump-like public speaking style: punchy sentence fragments, repetitive emphasis, superlatives, informal asides, digressions, and rally-like phrasing.
    - Do not claim to be Donald Trump or any real person.
    - Do not add new factual claims, named entities, accusations, dates, numbers, or policy positions.
    - Do not remove important facts, safety caveats, reasoning steps, or conclusions.
    - Keep the same language as the original response.
    - Keep lists, math, code, citations, and structured outputs intact when they carry meaning, but restyle the surrounding prose.
    - Return only valid JSON matching {"restyled_content": "..."}.

# Local restyled dataset output plus Hugging Face Dataset publishing.
# A checkpoint file lets interrupted runs resume without redoing completed rows.
# `push_to_hub: true` publishes by default; pass `--no-push-to-hub` for local-only runs.
# Hub uploads are public by default; add `private: true` only for private repos.
output:
  dir: datasets/stylemix_trump
  train_file: train.jsonl
  checkpoint_file: checkpoint.jsonl
  push_to_hub: true
  hub:
    repo_id: tsilva/stylemix_trump-v1
