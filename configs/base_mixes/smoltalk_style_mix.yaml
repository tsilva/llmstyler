# Datamixxer base mix used as the reusable input for llmstyler restyle runs.
# `llmstyler build-mix` delegates this config to `datamixxer build`, then mirrors
# the built artifact into `output.dir` for the existing restyle handoff path.
id: smoltalk_style_mix
name: SmolTalk Style Mix
version: v1
seed: 3407
buffer_size: 10000

split:
  test_size: 0.1

tagging:
  - rate: 0.2
    output_splits: [train]
    balance_by: [source]
    tags:
      restyle: true

source:
  dataset_id: HuggingFaceTB/smoltalk2
  config: SFT

plan:
  - name: capability_magpie
    split: smoltalk_smollm3_smol_magpie_ultra_no_think
    count: 300
  - name: capability_rewrite
    split: smoltalk_smollm3_smol_rewrite_no_think
    count: 150
  - name: capability_summarize
    split: smoltalk_smollm3_smol_summarize_no_think
    count: 100
  - name: capability_instruction_following
    split: tulu_3_sft_personas_instruction_following_no_think
    count: 100
  - name: capability_science
    split: Mixture_of_Thoughts_science_no_think
    count: 50
  - name: restyle_magpie
    split: smoltalk_smollm3_smol_magpie_ultra_no_think
    count: 180
  - name: restyle_rewrite
    split: smoltalk_smollm3_smol_rewrite_no_think
    count: 70
  - name: restyle_summarize
    split: smoltalk_smollm3_smol_summarize_no_think
    count: 50

output:
  store_dir: .datamixxer/mixes
  dir: datasets/basemix_restyle
  train_file: train.jsonl
  test_file: test.jsonl
  push_to_hub: false
  hub:
    repo_id: tsilva/smoltalk_style_mix-v1
